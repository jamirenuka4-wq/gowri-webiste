<script>
// ===== Cart =====
const Cart = {
  get: () => { try { return JSON.parse(localStorage.getItem('gowri_cart') || '[]'); } catch { return []; } },
  save: (items) => localStorage.setItem('gowri_cart', JSON.stringify(items)),
  count: () => Cart.get().reduce((s, i) => s + (parseInt(i.qty) || 1), 0),
  add(product, qty = 1) {
    const items = Cart.get();
    const idx = items.findIndex(i => i.id === product.id);
    if (idx > -1) items[idx].qty = (parseInt(items[idx].qty) || 1) + qty;
    else items.push({ ...product, qty });
    Cart.save(items);
    updateCartBadge();
  }
};

function updateCartBadge() {
  const c = Cart.count();
  const b = document.getElementById('cartBadge');
  if (b) { b.textContent = c; b.style.display = c > 0 ? 'flex' : 'none'; }
}

function showToast(icon, title, desc, type = 'success') {
  const container = document.getElementById('toastContainer');
  if (!container) return;
  const t = document.createElement('div');
  t.className = `toast ${type !== 'success' ? type : ''}`;
  t.innerHTML = `<span class="toast-icon">${icon}</span><div class="toast-text"><div class="toast-title">${title}</div>${desc ? `<div class="toast-desc">${desc}</div>` : ''}</div>`;
  container.appendChild(t);
  setTimeout(() => t && t.parentElement && t.remove(), 4000);
}

let currentProduct = null;
let qty = 1;
let allProducts = [];

function changeQty(delta) {
  qty = Math.max(1, Math.min(10, qty + delta));
  const el = document.getElementById('qtyDisplay');
  if (el) el.textContent = qty;
}

function addToCart() {
  if (!currentProduct) return;
  Cart.add(currentProduct, qty);
  showToast('✅', 'Added to Cart!', `${qty}x ${currentProduct.name} added.`, 'success');
  const btn = document.getElementById('addCartBtn');
  if (btn) {
    const orig = btn.innerHTML;
    btn.innerHTML = '✓ Added to Cart!';
    btn.style.background = 'var(--green)';
    setTimeout(() => { btn.innerHTML = orig; btn.style.background = ''; }, 2000);
  }
}

function buyNow() {
  if (!currentProduct) return;
  Cart.add(currentProduct, qty);
  window.location.href = '/checkout';
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + name));
}

function switchMainImage(src, thumbEl) {
  const main = document.getElementById('mainProductImg');
  if (main) {
    main.style.opacity = '0';
    main.style.transform = 'scale(0.98)';
    setTimeout(() => {
      main.src = src;
      main.style.opacity = '1';
      main.style.transform = 'scale(1)';
    }, 200);
  }
  document.querySelectorAll('.thumb-img').forEach(t => t.style.borderColor = 'var(--border)');
  if (thumbEl) thumbEl.style.borderColor = 'var(--yellow)';
}

async function submitReview(e) {
  e.preventDefault();
  const rating = document.querySelector('input[name="rating"]:checked')?.value;
  const name = document.getElementById('reviewName')?.value.trim();
  const comment = document.getElementById('reviewComment')?.value.trim();
  if (!rating) { showToast('⚠️', 'Select a rating', 'Please choose 1–5 stars.', 'warning'); return; }
  if (!name || !comment) { showToast('⚠️', 'Fill all fields', 'Name and comment are required.', 'warning'); return; }
  const btn = document.getElementById('submitReviewBtn');
  btn.textContent = '⏳ Submitting...'; btn.disabled = true;
  try {
    await fetch('/api/reviews', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product_id: currentProduct.id, customer_name: name, rating: parseInt(rating), comment })
    });
    showToast('⭐', 'Review Submitted!', 'Thank you for your feedback!', 'success');
    document.getElementById('reviewForm').reset();
  } catch {
    showToast('❌', 'Failed', 'Could not submit review. Please try again.', 'error');
  } finally {
    btn.textContent = 'Submit Review ⭐'; btn.disabled = false;
  }
}

// ===== Extract product ID from clean URL /product/123 =====
function getProductId() {
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  // Expect: ['product', '123']
  if (pathParts.length >= 2 && pathParts[0] === 'product') {
    const id = parseInt(pathParts[1]);
    if (!isNaN(id) && id > 0) return id;
  }
  return null;
}

function renderRelated(products, currentId, category) {
  const section = document.getElementById('relatedSection');
  const grid = document.getElementById('relatedGrid');
  const related = products.filter(p => p.id !== currentId && p.category === category).slice(0, 4);
  if (related.length === 0 || !section || !grid) return;
  section.style.display = 'block';
  grid.innerHTML = related.map((p, i) => {
    const discount = p.original_price && p.original_price > p.price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
    const stars = '★'.repeat(Math.round(p.rating || 4.5)) + '☆'.repeat(5 - Math.round(p.rating || 4.5));
    return `
      <article class="product-card">
        <a href="/product/${p.id}"><div class="product-card-image"><img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='/images/mango_pickle.png'"></div></a>
        <div class="product-card-body">
          <div class="product-category">${p.category} Pickle</div>
          <h3><a href="/product/${p.id}" style="color:inherit;text-decoration:none;">${p.name}</a></h3>
          <div class="product-rating"><span class="stars">${stars}</span><span class="rating-count">${p.rating}</span></div>
          <div class="product-price-row">
            <div class="price-info"><span class="price">₹${p.price}</span>${p.original_price && p.original_price > p.price ? `<span class="price-original">₹${p.original_price}</span>` : ''}</div>
            <button class="add-to-cart-btn" onclick="Cart.add({id:${p.id},name:'${p.name}',price:${p.price},image:'${p.image}',spice_level:'${p.spice_level||'Medium'}',weight:'${p.weight||'250g'}'},1); updateCartBadge();" aria-label="Add ${p.name} to cart">+</button>
          </div>
        </div>
      </article>`;
  }).join('');
}

async function loadProduct() {
  const productId = getProductId();

  if (!productId) {
    document.getElementById('productContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😔</div>
        <h3>Product Not Found</h3>
        <p>We couldn't find this product. Please go back and try again.</p>
        <a href="/" class="btn btn-primary btn-lg">← Back to Store</a>
      </div>`;
    return;
  }

  try {
    // Fetch product and all products in parallel
    const [prodRes, allRes] = await Promise.all([
      fetch(`/api/products/${productId}`),
      fetch('/api/products')
    ]);

    if (!prodRes.ok) throw new Error('Product not found');

    const p = await prodRes.json();
    allProducts = await allRes.json();
    currentProduct = p;

    // Update SEO
    document.title = `${p.name} – Buy ${p.category} Pickle Online | Gowri Pickles`;
    document.getElementById('pageTitle').textContent = `${p.name} – Gowri Pickles`;

    document.getElementById('breadcrumbName').textContent = p.name;

    // JSON-LD
    const ld = document.createElement('script');
    ld.type = 'application/ld+json';
    ld.textContent = JSON.stringify({

      "@type": "Product",
      "name": p.name,
      "image": [p.image],
      "description": p.description,
      "brand": { "@type": "Brand", "name": "Gowri Pickles" },
      "offers": { "@type": "Offer", "price": p.price, "priceCurrency": "INR", "availability": p.in_stock ? "https://schema.org/InStock" : "https://schema.org/OutOfStock", "seller": { "@type": "Organization", "name": "Gowri Pickles" } },
      "aggregateRating": { "@type": "AggregateRating", "ratingValue": p.rating, "reviewCount": p.reviews_count || 1 }
    });
    document.head.appendChild(ld);

    const discount = p.original_price && p.original_price > p.price ? Math.round((1 - p.price / p.original_price) * 100) : 0;
    const stars = '★'.repeat(Math.round(p.rating || 4.5)) + '☆'.repeat(5 - Math.round(p.rating || 4.5));
    const ings = (p.ingredients || '').split(',').map(s => s.trim()).filter(Boolean);

          <div class="main-image" id="mainImageBox">
            <img src="${p.image}" alt="${p.name} – Authentic Indian Pickle by Gowri Pickles"
                 id="mainProductImg"
                 style="transition:opacity 0.2s,transform 0.3s;"
                 onerror="this.src='/images/mango_pickle.png'">
          </div>
          <div style="display:flex;gap:10px;margin-top:12px;">

                   onclick="switchMainImage('${img}', this)"
                   onmouseover="this.style.transform='scale(1.05)'"
                   onmouseout="this.style.transform=''">
                <img src="${img}" style="width:100%;height:100%;object-fit:cover;" alt="Product view ${i+1}" onerror="this.parentElement.style.display='none'">

          <!-- Share buttons -->

                  <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;">Rate this product:</p>
                  <div class="star-rating-input" role="group" aria-label="Star rating">
                    ${[5,4,3,2,1].map(n => `<label for="star${n}" title="${n} star${n>1?'s':''}">★<input type="radio" id="star${n}" name="rating" value="${n}"></label>`).join('')}
                  </div>
                  <div class="form-group">
                    <input class="form-input" id="reviewName" type="text" placeholder="Your name" required>
                  </div>
                  <div class="form-group">
                    <textarea class="form-textarea" id="reviewComment" placeholder="Share your experience with this pickle..." required rows="3"></textarea>
                  </div>
                  <button type="submit" class="btn btn-primary" id="submitReviewBtn">Submit Review ⭐</button>
                </form>
              </div>
              <div id="reviewsList">
                ${(p.reviews || []).length > 0
                  ? (p.reviews || []).map(r => {
                      const s = '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating);
                      const init = r.customer_name.split(' ').map(n => n[0]).join('');
                      return `<div class="review-card" style="margin-bottom:16px;">
                        <div class="review-header">
                          <div class="review-avatar" style="background:var(--grad-hero)">${init}</div>
                          <div><div class="reviewer-name">${r.customer_name}</div><div class="review-date">${new Date(r.created_at).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div></div>
                          <div class="stars" style="margin-left:auto;font-size:1rem;">${s}</div>
                        </div>
                        <p class="review-text">"${r.comment}"</p>
                        <div style="margin-top:8px;font-size:0.78rem;color:var(--green);font-weight:600;">✓ Verified Purchase</div>
                      </div>`;
                    }).join('')
                  : '<div style="text-align:center;padding:40px 20px;color:var(--text-muted);"><div style="font-size:2.5rem;margin-bottom:12px;">⭐</div><p>Be the first to review this product!</p></div>'}
              </div>
            </div>
          </div>
        </div>
      </div>
    `;

    // Render related products
    renderRelated(allProducts, p.id, p.category);
    updateCartBadge();

  } catch (err) {
    console.error('Product load error:', err);
    document.getElementById('productContent').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">😔</div>
        <h3>Product Not Found</h3>
        <p>Sorry, we couldn't find this pickle. It may have been removed.</p>
        <a href="/" class="btn btn-primary btn-lg" style="margin-top:16px;">← Back to Store</a>
      </div>`;
  }
}

function renderRelated(products, currentId, category) {
  const section = document.getElementById('relatedSection');
  const grid = document.getElementById('relatedGrid');
  const related = products.filter(p => p.id !== currentId && p.category === category).slice(0, 4);
  if (related.length === 0 || !section || !grid) return;
  section.style.display = 'block';
  grid.innerHTML = related.map(p => {
    const stars = '★'.repeat(Math.round(p.rating || 4.5)) + '☆'.repeat(5 - Math.round(p.rating || 4.5));
    return `
      <article class="product-card">
        <a href="/product/${p.id}"><div class="product-card-image"><img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='/images/mango_pickle.png'"></div></a>
        <div class="product-card-body">
          <div class="product-category">${p.category} Pickle</div>
          <h3><a href="/product/${p.id}" style="color:inherit;text-decoration:none;">${p.name}</a></h3>
          <div class="product-rating"><span class="stars">${stars}</span><span class="rating-count">${p.rating}</span></div>
          <div class="product-price-row">
            <div class="price-info"><span class="price">₹${p.price}</span></div>
            <button class="add-to-cart-btn" onclick="Cart.add({id:${p.id},name:'${p.name.replace(/'/g,"\\'")}',price:${p.price},image:'${p.image}',spice_level:'${p.spice_level||'Medium'}',weight:'${p.weight||'250g'}'},1);updateCartBadge();" aria-label="Add to cart">+</button>
          </div>
        </div>
      </article>`;
  }).join('');
}

window.addEventListener('scroll', () => {
  document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

// Init
loadProduct();
</script>
</body>
</html>
