<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 – Page Not Found | Gowri Pickles</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/png" href="/images/logo.png">
</head>
<body style="background:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px;">
  <div style="font-size:6rem;margin-bottom:16px;animation:float 4s ease-in-out infinite;">🥫</div>
  <h1 style="font-family:var(--font-heading);font-size:4rem;color:var(--red);margin-bottom:8px;">404</h1>
  <h2 style="font-family:var(--font-heading);font-size:1.8rem;color:var(--text-dark);margin-bottom:16px;">Oops! This Pickle Jar is Empty</h2>
  <p style="color:var(--text-muted);font-size:1rem;max-width:400px;line-height:1.7;margin-bottom:32px;">
    The page you're looking for has gone sour! Don't worry, our delicious pickles are still waiting for you.
  </p>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
    <a href="/" style="background:var(--red);color:white;padding:14px 32px;border-radius:50px;font-family:var(--font-ui);font-weight:600;font-size:0.95rem;text-decoration:none;transition:all 0.3s;" onmouseover="this.style.background='var(--red-dark)'" onmouseout="this.style.background='var(--red)'">🏠 Back to Home</a>
    <a href="/#products" style="background:white;color:var(--red);border:2px solid var(--red);padding:14px 32px;border-radius:50px;font-family:var(--font-ui);font-weight:600;font-size:0.95rem;text-decoration:none;">🥫 Browse Pickles</a>
  </div>
  <style>
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
    :root { --cream:#FFFBF0;--red:#C0392B;--red-dark:#922B21;--text-dark:#2C1810;--text-muted:#7F8C8D;--font-heading:'Playfair Display',serif;--font-ui:'Poppins',sans-serif; }
  </style>
</body>
</html>
